name: nes_poker_cash_tools
description: ""

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # Database
  drift: ^2.31.0
  drift_flutter: ^0.2.8
  path_provider: ^2.1.5

  # State management
  bloc: ^9.2.0
  meta: ^1.17.0
  flutter_bloc: ^9.1.1
  bloc_concurrency: ^0.3.0

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # UI
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter

  drift_dev: ^2.31.0
  build_runner: ^2.11.1

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

# Flutter Native Splash configuration
flutter_native_splash:
  # Background color 
  color: "#000000"

  # Path to the splash screen image
  image: assets/images/splash_logo.png

  # Optional: Set the background color for the app icon on Android 12 and above
  android_12:
    color: "#000000"
    image: assets/images/splash_logo.png

flutter_intl:
  enabled: true
